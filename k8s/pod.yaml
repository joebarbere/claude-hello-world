apiVersion: v1
kind: Pod
metadata:
  name: claude-hello-world
  labels:
    app: claude-hello-world
spec:
  containers:
    - name: nginx
      image: localhost/claude-hello-world:latest
      ports:
        - containerPort: 80
          hostPort: 8080
        - containerPort: 443
          hostPort: 8443

---

apiVersion: v1
kind: Pod
metadata:
  name: weather-api
  labels:
    app: weather-api
spec:
  containers:
    - name: weather-api
      image: localhost/weather-api:latest
      ports:
        - containerPort: 8080
          hostPort: 5221
      env:
        - name: ConnectionStrings__DefaultConnection
          value: Host=host.containers.internal;Port=5432;Database=appdb;Username=appuser;Password=apppassword
        - name: OryKratosPublicUrl
          value: http://host.containers.internal:4433

---

apiVersion: v1
kind: Pod
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  containers:
    - name: postgres
      image: localhost/postgres:latest
      ports:
        - containerPort: 5432
          hostPort: 5432
      env:
        - name: POSTGRES_DB
          value: appdb
        - name: POSTGRES_USER
          value: appuser
        - name: POSTGRES_PASSWORD
          value: apppassword

---

apiVersion: v1
kind: Pod
metadata:
  name: ory-kratos
  labels:
    app: ory-kratos
spec:
  initContainers:
    - name: ory-kratos-init
      image: localhost/ory-kratos-init:latest
      env:
        - name: KRATOS_ADMIN_URL
          value: http://host.containers.internal:4434
  containers:
    - name: ory-kratos
      image: localhost/ory-kratos:latest
      ports:
        - containerPort: 4433
          hostPort: 4433
        - containerPort: 4434
          hostPort: 4434
      env:
        - name: DSN
          value: sqlite:///var/lib/kratos/db.sqlite?_fk=true
        - name: OryKratosPublicUrl
          value: http://host.containers.internal:4433
