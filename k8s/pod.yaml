apiVersion: v1
kind: Pod
metadata:
  name: claude-hello-world
  labels:
    app: claude-hello-world
spec:
  containers:
    - name: nginx
      image: localhost/claude-hello-world:latest
      ports:
        - containerPort: 80
          hostPort: 8080

---

apiVersion: v1
kind: Pod
metadata:
  name: weather-api
  labels:
    app: weather-api
spec:
  containers:
    - name: weather-api
      image: localhost/weather-api:latest
      ports:
        - containerPort: 8080
          hostPort: 5221
      env:
        - name: ConnectionStrings__DefaultConnection
          value: Host=host.containers.internal;Port=5432;Database=appdb;Username=appuser;Password=apppassword

---

apiVersion: v1
kind: Pod
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  containers:
    - name: postgres
      image: localhost/postgres:latest
      ports:
        - containerPort: 5432
          hostPort: 5432
      env:
        - name: POSTGRES_DB
          value: appdb
        - name: POSTGRES_USER
          value: appuser
        - name: POSTGRES_PASSWORD
          value: apppassword
