apiVersion: v1
kind: Pod
metadata:
  name: claude-hello-world
  labels:
    app: claude-hello-world
spec:
  containers:
    - name: nginx
      image: localhost/claude-hello-world:latest
      ports:
        - containerPort: 80
          hostPort: 8080

---

apiVersion: v1
kind: Pod
metadata:
  name: weather-api
  labels:
    app: weather-api
spec:
  containers:
    - name: weather-api
      image: localhost/weather-api:latest
      ports:
        - containerPort: 8080
          hostPort: 5221
