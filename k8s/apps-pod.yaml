apiVersion: v1
kind: Pod
metadata:
  name: weather-api
  labels:
    app: weather-api
spec:
  containers:
    - name: weather-api
      image: localhost/weather-api:latest
      ports:
        - containerPort: 8080
          hostPort: 5221
      env:
        - name: ConnectionStrings__DefaultConnection
          value: Host=host.containers.internal;Port=5432;Database=appdb;Username=appuser;Password=apppassword
        - name: OryKratosPublicUrl
          value: http://host.containers.internal:4433

---

apiVersion: v1
kind: Pod
metadata:
  name: claude-hello-world
  labels:
    app: claude-hello-world
spec:
  containers:
    - name: traefik
      image: localhost/traefik:latest
      ports:
        - containerPort: 80
          hostPort: 8080
        - containerPort: 443
          hostPort: 8443
        - containerPort: 8081
          hostPort: 8081
    - name: nginx
      image: localhost/claude-hello-world:latest
    - name: nginx-exporter
      image: nginx/nginx-prometheus-exporter:latest
      args:
        - --nginx.scrape-uri=http://localhost:8080/nginx_status
      ports:
        - containerPort: 9113
          hostPort: 9113
