apiVersion: v1
kind: Pod
metadata:
  name: datascience
  labels:
    app: datascience
spec:
  containers:
    - name: airflow
      image: localhost/airflow:latest
      ports:
        - containerPort: 8080
          hostPort: 8280
      env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: SequentialExecutor
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "sqlite:////opt/airflow/airflow.db"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "false"
        - name: AIRFLOW__WEBSERVER__BASE_URL
          value: "http://localhost:8280"
        - name: AIRFLOW__WEBSERVER__WEB_SERVER_PORT
          value: "8080"
        - name: AIRFLOW__WEBSERVER__SECRET_KEY
          value: datascience-dev-key
        - name: _AIRFLOW_WWW_USER_CREATE
          value: "true"
        - name: _AIRFLOW_WWW_USER_USERNAME
          value: admin
        - name: _AIRFLOW_WWW_USER_PASSWORD
          value: admin
      volumeMounts:
        - name: airflow-dags
          mountPath: /opt/airflow/dags

    - name: jupyter
      image: localhost/jupyter:latest
      ports:
        - containerPort: 8888
          hostPort: 8888
      env:
        - name: JUPYTER_TOKEN
          value: datascience
        - name: JUPYTER_ENABLE_LAB
          value: "yes"
      volumeMounts:
        - name: jupyter-work
          mountPath: /home/jovyan/work

    - name: minio
      image: quay.io/minio/minio:latest
      args: ["server", "/data", "--console-address", ":9001"]
      ports:
        - containerPort: 9000
          hostPort: 9000
        - containerPort: 9001
          hostPort: 9001
      env:
        - name: MINIO_ROOT_USER
          value: minioadmin
        - name: MINIO_ROOT_PASSWORD
          value: minioadmin
      volumeMounts:
        - name: minio-data
          mountPath: /data

  volumes:
    - name: airflow-dags
      hostPath:
        path: /tmp/datascience/airflow/dags
    - name: jupyter-work
      hostPath:
        path: /tmp/datascience/jupyter/work
    # To persist MinIO objects across restarts, map this to a local directory:
    #   mkdir -p ~/datascience/minio/data
    # Then change the hostPath below from /tmp/datascience/minio/data to ~/datascience/minio/data
    # (use the absolute expanded path, e.g. /home/joe/datascience/minio/data)
    - name: minio-data
      hostPath:
        path: /tmp/datascience/minio/data
