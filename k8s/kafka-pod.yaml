apiVersion: v1
kind: Pod
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  containers:
    - name: kafka
      image: docker.io/apache/kafka:3.9.0
      ports:
        - containerPort: 9092
          hostPort: 9092
        - containerPort: 9094
          hostPort: 9094
      env:
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:9093"
        - name: KAFKA_LISTENERS
          value: "INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "INTERNAL://localhost:9092,EXTERNAL://host.containers.internal:9094"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "INTERNAL"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        - name: CLUSTER_ID
          value: "MkU3OEVBNTcwNTJENDM2Qk"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx256m -Xms256m"

    - name: schema-registry
      image: docker.io/confluentinc/cp-schema-registry:7.7.1
      ports:
        - containerPort: 8081
          hostPort: 8085
      env:
        - name: SCHEMA_REGISTRY_HOST_NAME
          value: "localhost"
        - name: SCHEMA_REGISTRY_LISTENERS
          value: "http://0.0.0.0:8081"
        - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
          value: "localhost:9092"
        - name: SCHEMA_REGISTRY_HEAP_OPTS
          value: "-Xmx128m -Xms128m"

    - name: debezium-connect
      image: localhost/debezium-connect:latest
      ports:
        - containerPort: 8083
          hostPort: 8083
        - containerPort: 9404
          hostPort: 9404
      env:
        - name: BOOTSTRAP_SERVERS
          value: "localhost:9092"
        - name: GROUP_ID
          value: "1"
        - name: CONFIG_STORAGE_TOPIC
          value: "connect_configs"
        - name: OFFSET_STORAGE_TOPIC
          value: "connect_offsets"
        - name: STATUS_STORAGE_TOPIC
          value: "connect_statuses"
        - name: CONFIG_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: OFFSET_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: STATUS_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: HEAP_OPTS
          value: "-Xmx256m -Xms256m"
        - name: KEY_CONVERTER
          value: "io.confluent.connect.avro.AvroConverter"
        - name: KEY_CONVERTER_SCHEMA_REGISTRY_URL
          value: "http://localhost:8081"
        - name: VALUE_CONVERTER
          value: "io.confluent.connect.avro.AvroConverter"
        - name: VALUE_CONVERTER_SCHEMA_REGISTRY_URL
          value: "http://localhost:8081"

    - name: debezium-init
      image: localhost/debezium-init:latest
      env:
        - name: CONNECT_URL
          value: "http://localhost:8083"

    - name: kafka-ui
      image: docker.io/kafbat/kafka-ui:latest
      ports:
        - containerPort: 8080
          hostPort: 8090
      env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "local"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "localhost:9092"
        - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
          value: "debezium"
        - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
          value: "http://localhost:8083"
        - name: SERVER_SERVLET_CONTEXT_PATH
          value: "/kafka-ui"
        - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
          value: "http://localhost:8081"
        - name: JAVA_OPTS
          value: "-Xmx128m -Xms128m"

    - name: slot-guard
      image: localhost/slot-guard:latest
      env:
        - name: PGHOST
          value: "host.containers.internal"
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          value: "appuser"
        - name: PGDATABASE
          value: "appdb"
        - name: PGPASSWORD
          value: "apppassword"
        - name: LAG_THRESHOLD_BYTES
          value: "5368709120"
        - name: CHECK_INTERVAL
          value: "900"
