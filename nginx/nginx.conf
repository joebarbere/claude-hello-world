events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{'
      '"time_local":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"http_user_agent":"$http_user_agent",'
      '"http_referer":"$http_referer",'
      '"request_time":$request_time'
    '}';

  error_log /dev/stderr;
  access_log /dev/stdout json_combined;

  server {
    listen 8080;

    # Shell app (host)
    location / {
      root /usr/share/nginx/html/shell;
      try_files $uri $uri/ /index.html;
    }

    # Remote: weather-app - must be accessible for remoteEntry.mjs
    location /weather-app/ {
      alias /usr/share/nginx/html/weather-app/;
      try_files $uri /weather-app/index.html;
    }

    # Remote: weatheredit-app
    location /weatheredit-app/ {
      alias /usr/share/nginx/html/weatheredit-app/;
      try_files $uri /weatheredit-app/index.html;
    }

    # Remote: admin-app
    location /admin-app/ {
      alias /usr/share/nginx/html/admin-app/;
      try_files $uri /admin-app/index.html;
    }

    # Prometheus nginx-exporter scrape target
    location /nginx_status {
      stub_status;
      access_log off;
    }
  }
}
