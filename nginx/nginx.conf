events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Shell app (host)
    location / {
      root /usr/share/nginx/html/shell;
      try_files $uri $uri/ /index.html;
    }

    # Remote: weather-app - must be accessible for remoteEntry.mjs
    location /weather-app/ {
      alias /usr/share/nginx/html/weather-app/;
      try_files $uri /weather-app/index.html;
    }

    # Remote: weatheredit-app
    location /weatheredit-app/ {
      alias /usr/share/nginx/html/weatheredit-app/;
      try_files $uri /weatheredit-app/index.html;
    }

    # Proxy: weather-api (exact /weather for list/create)
    # Using exact match to prevent /weather-app and /weatheredit-app from being
    # accidentally matched by a prefix location /weather.
    location = /weather {
      proxy_pass http://host.containers.internal:5221/weatherforecast;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Cookie $http_cookie;
    }

    # Proxy: Ory Kratos public API (used by Angular for session/login flows)
    location /.ory/kratos/public/ {
      proxy_pass http://host.containers.internal:4433/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    # Proxy: weather-api sub-paths (/weather/{id} for get/update/delete)
    # ^~ stops regex evaluation; /weather/ prefix won't match /weather-app/ or /weatheredit-app/
    location ^~ /weather/ {
      proxy_pass http://host.containers.internal:5221/weatherforecast/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Cookie $http_cookie;
    }
  }
}
