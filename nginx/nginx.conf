events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;

    # Shell app (host)
    location / {
      root /usr/share/nginx/html/shell;
      try_files $uri $uri/ /index.html;
    }

    # Remote: weather-app - must be accessible for remoteEntry.mjs
    location /weather-app/ {
      alias /usr/share/nginx/html/weather-app/;
      try_files $uri /weather-app/index.html;
    }

    # Remote: page2
    location /page2/ {
      alias /usr/share/nginx/html/page2/;
      try_files $uri /page2/index.html;
    }

    # Proxy: weather-api
    location /weather {
      proxy_pass http://host.containers.internal:5221/weatherforecast;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
