events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;

    # Shell app (host)
    location / {
      root /usr/share/nginx/html/shell;
      try_files $uri $uri/ /index.html;
    }

    # Remote: weather-app - must be accessible for remoteEntry.mjs
    location /weather-app/ {
      alias /usr/share/nginx/html/weather-app/;
      try_files $uri /weather-app/index.html;
    }

    # Remote: weatheredit-app
    location /weatheredit-app/ {
      alias /usr/share/nginx/html/weatheredit-app/;
      try_files $uri /weatheredit-app/index.html;
    }

    # Proxy: weather-api (exact /weather for list/create)
    # Using exact match to prevent /weather-app and /weatheredit-app from being
    # accidentally matched by a prefix location /weather.
    location = /weather {
      proxy_pass http://host.containers.internal:5221/weatherforecast;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: weather-api sub-paths (/weather/{id} for get/update/delete)
    # ^~ stops regex evaluation; /weather/ prefix won't match /weather-app/ or /weatheredit-app/
    location ^~ /weather/ {
      proxy_pass http://host.containers.internal:5221/weatherforecast/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
