entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  traefik:
    address: ":8081"

api:
  dashboard: true
  insecure: true

providers:
  file:
    filename: /etc/traefik/traefik-dynamic.yml
    watch: false

log:
  level: WARN
