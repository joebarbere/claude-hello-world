http:
  routers:
    # Ory Kratos admin API — highest priority
    kratos-admin-router:
      rule: "PathPrefix(`/.ory/kratos/admin`)"
      entryPoints:
        - websecure
      service: kratos-admin
      priority: 31
      middlewares:
        - strip-ory-admin-prefix
      tls: {}

    # Ory Kratos public API
    kratos-router:
      rule: "PathPrefix(`/.ory/kratos/public`)"
      entryPoints:
        - websecure
      service: kratos
      priority: 30
      middlewares:
        - strip-ory-prefix
      tls: {}

    # Signup endpoint — public, routed to weather-api
    signup-router:
      rule: "Path(`/signup`)"
      entryPoints:
        - websecure
      service: weather-api
      priority: 20
      tls: {}

    # Weather API — exact /weather (list/create)
    weather-exact-router:
      rule: "Path(`/weather`)"
      entryPoints:
        - websecure
      service: weather-api
      priority: 20
      middlewares:
        - weather-replace-path
      tls: {}

    # Weather API — /weather/{id} sub-paths (get/update/delete)
    # Excludes /weather-app/ and /weatheredit-app/ which are Angular MFE routes
    weather-sub-router:
      rule: "PathPrefix(`/weather/`) && !PathPrefix(`/weather-app/`) && !PathPrefix(`/weatheredit-app/`)"
      entryPoints:
        - websecure
      service: weather-api
      priority: 15
      middlewares:
        - weather-replace-path-regex
      tls: {}

    # Grafana — SSO via Kratos (auth-proxy checks session, sets X-Webauth-User)
    grafana-router:
      rule: "PathPrefix(`/grafana`)"
      entryPoints:
        - websecure
      service: grafana
      priority: 25
      middlewares:
        - kratos-auth
      tls: {}

    # Airflow — SSO via Kratos auth-proxy (Airflow handles /airflow base path natively)
    airflow-router:
      rule: "PathPrefix(`/airflow`)"
      entryPoints:
        - websecure
      service: airflow
      priority: 25
      middlewares:
        - kratos-auth
      tls: {}

    # Jupyter — SSO via Kratos auth-proxy (Jupyter handles /jupyter base_url natively)
    jupyter-router:
      rule: "PathPrefix(`/jupyter`)"
      entryPoints:
        - websecure
      service: jupyter
      priority: 25
      middlewares:
        - kratos-auth
      tls: {}

    # MinIO Console — access gated via Kratos auth-proxy
    minio-router:
      rule: "PathPrefix(`/minio`)"
      entryPoints:
        - websecure
      service: minio-console
      priority: 25
      middlewares:
        - kratos-auth
        - strip-minio-prefix
      tls: {}

    # Kafka UI — topic browser and Kafka Connect management
    kafka-ui-router:
      rule: "PathPrefix(`/kafka-ui`)"
      entryPoints:
        - websecure
      service: kafka-ui
      priority: 22
      tls: {}

    # Minions API — routed to weather-api
    minions-router:
      rule: "PathPrefix(`/minions`)"
      entryPoints:
        - websecure
      service: weather-api
      priority: 20
      tls: {}

    # Angular apps — catch-all to nginx (static files)
    nginx-router:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - websecure
      service: nginx
      priority: 1
      tls: {}

  services:
    # nginx serves Angular static files (same pod, shared network namespace)
    nginx:
      loadBalancer:
        servers:
          - url: "http://localhost:8080"

    # Weather API in separate pod
    weather-api:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:5221"

    # Ory Kratos in separate pod
    kratos:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:4433"

    # Ory Kratos admin API in separate pod
    kratos-admin:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:4434"

    # Kafka UI in kafka pod
    kafka-ui:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:8090"

    # Grafana in observability pod
    grafana:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:3000"

    # Airflow in datascience pod
    airflow:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:8280"

    # Jupyter in datascience pod (base_url=/jupyter, no strip needed)
    jupyter:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:8888"

    # MinIO Console in datascience pod
    minio-console:
      loadBalancer:
        servers:
          - url: "http://host.containers.internal:9001"

  middlewares:
    # Strip /.ory/kratos/public prefix before forwarding to Kratos
    strip-ory-prefix:
      stripPrefix:
        prefixes:
          - "/.ory/kratos/public"

    # Strip /.ory/kratos/admin prefix before forwarding to Kratos admin
    strip-ory-admin-prefix:
      stripPrefix:
        prefixes:
          - "/.ory/kratos/admin"

    # Kratos SSO: verify session via auth-proxy, copy user email headers
    kratos-auth:
      forwardAuth:
        address: "http://host.containers.internal:4180"
        authResponseHeaders:
          - X-Webauth-User
          - Remote-User

    # Strip /grafana prefix before forwarding to Grafana
    strip-grafana-prefix:
      stripPrefix:
        prefixes:
          - "/grafana"

    # Strip /minio prefix before forwarding to MinIO Console
    strip-minio-prefix:
      stripPrefix:
        prefixes:
          - "/minio"

    # Rewrite /weather → /weatherforecast
    weather-replace-path:
      replacePath:
        path: "/weatherforecast"

    # Rewrite /weather/{id} → /weatherforecast/{id}
    weather-replace-path-regex:
      replacePathRegex:
        regex: "^/weather/(.*)"
        replacement: "/weatherforecast/$1"

tls:
  certificates:
    - certFile: /etc/traefik/ssl/localhost.crt
      keyFile: /etc/traefik/ssl/localhost.key
