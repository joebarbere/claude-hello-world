<div class="app-layout" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">
        <i class="pi pi-bolt"></i>
        @if (!sidebarCollapsed()) {
          <span class="sidebar-title">NxWeather</span>
        }
      </span>
      <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <i [class]="sidebarCollapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'"></i>
      </button>
    </div>
    <nav class="sidebar-nav" aria-label="Main navigation">
      @for (item of navItems; track item.route) {
        <a
          class="nav-item"
          [class.active]="isActive(item.route)"
          [routerLink]="item.route"
          [attr.title]="sidebarCollapsed() ? item.label : null"
          [attr.aria-label]="item.label"
        >
          <i [class]="item.icon"></i>
          @if (!sidebarCollapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }

      @if (session()) {
        <div class="user-profile">
          <div class="user-info">
            <i class="pi pi-user user-avatar"></i>
            @if (!sidebarCollapsed()) {
              <div class="user-details">
                <span class="user-email" [title]="session()!.email">{{ session()!.email }}</span>
                @if (session()!.role) {
                  <span class="user-role">{{ session()!.role }}</span>
                }
              </div>
            }
          </div>
          <button
            class="sign-out-btn"
            (click)="logoutRequest.emit()"
            [attr.title]="sidebarCollapsed() ? 'Sign out' : null"
            aria-label="Sign out"
          >
            <i class="pi pi-sign-out"></i>
            @if (!sidebarCollapsed()) {
              <span>Sign out</span>
            }
          </button>
        </div>
      }
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
