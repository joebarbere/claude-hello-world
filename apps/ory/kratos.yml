version: v1.3.0

dsn: postgres://appuser:apppassword@host.containers.internal:5432/appdb?sslmode=disable

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:4200
        - http://localhost:8080
        - https://localhost:8443
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: https://localhost:8443/
  allowed_return_urls:
    - http://localhost:4200
    - http://localhost:4200/weatheredit-app
    - http://localhost:8080
    - http://localhost:8080/weatheredit-app
    - https://localhost:8443
    - https://localhost:8443/weatheredit-app

  methods:
    password:
      enabled: true

  flows:
    login:
      ui_url: https://localhost:8443/auth/login
      lifespan: 10m
    logout:
      after:
        default_browser_return_url: https://localhost:8443/
    error:
      ui_url: https://localhost:8443/auth/error
    settings:
      ui_url: https://localhost:8443/auth/settings
      privileged_session_max_age: 15m

log:
  level: info
  format: text

secrets:
  cookie:
    - CHANGE-ME-COOKIE-SECRET-32-CHARS!!
  cipher:
    - CHANGE-ME-CIPHER-SECRET-32-CHARS

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtp://localhost:1025/?skip_ssl_verify=true
