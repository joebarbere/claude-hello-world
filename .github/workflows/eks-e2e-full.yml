name: EKS E2E Tests (Full)

on:
  workflow_dispatch:

# Permissions needed:
#   pull-requests: write  → post comment on the merged PR
#   checks: write         → dorny/test-reporter creates a Check Run
#   contents: read        → checkout
permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NX_NO_CLOUD: true

jobs:
  e2e:
    name: Playwright E2E – EKS Pods (Full)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & toolchain ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Node dependencies
        run: npm ci

      # Cache NuGet packages across runs; keyed on WeatherApi.csproj so the cache
      # is invalidated only when package references change (~1 min saved per run).
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('apps/weather-api/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      # Cache Playwright browser binaries (~100 MB) so they aren't re-downloaded
      # on every run. System-level deps are still installed when cache is hit.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Build container images ───────────────────────────────────────────────
      # shell:podman-build depends on build-all, which builds all 3 Angular MFEs
      # then packages them into the nginx container image.
      - name: Build Angular MFEs + nginx container image
        run: npx nx podman-build shell

      # weather-api:podman-build depends on weather-api:build (dotnet build)
      # then packages the published output into the ASP.NET container image.
      - name: Build weather-api container image
        run: NX_DAEMON=false npx nx podman-build weather-api

      # postgres:podman-build wraps postgres:17-alpine with env defaults.
      - name: Build postgres container image
        run: npx nx podman-build postgres

      # ory:podman-build builds the ory-kratos and ory-kratos-init images.
      - name: Build ory-kratos container images
        run: npx nx podman-build ory

      # ── Start EKS pods ───────────────────────────────────────────────────────
      # kube-up applies pods in dependency order:
      #   1. postgres-pod.yaml (:5432)
      #   2. waits for pg_isready
      #   3. ory-kratos-pod.yaml (:4433/:4434)  — kratos-migrate runs after postgres is ready
      #   4. apps-pod.yaml: weather-api (:5221) + claude-hello-world/nginx (:8080/:8443)
      - name: Start EKS pods (podman play kube)
        run: npx nx kube-up shell

      # Show initial pod state right after kube-up so we can see container
      # images and status in the log even if the health-check step times out.
      - name: Show pod status after kube-up
        run: |
          echo "=== podman pod ps ==="
          podman pod ps
          echo "=== podman ps -a ==="
          podman ps -a
          echo "=== container state & exit codes ==="
          for c in claude-hello-world-nginx weather-api-weather-api \
                   ory-kratos-ory-kratos ory-kratos-ory-kratos-init \
                   postgres-postgres; do
            echo "--- $c ---"
            podman inspect --format \
              'status={{.State.Status}} exit={{.State.ExitCode}} error="{{.State.Error}}"' \
              "$c" 2>/dev/null || echo "(not found)"
          done
          echo "=== listening ports ==="
          ss -tlnp || true

      # Poll all pods concurrently to cut wait time when all are slow to start.
      # nginx redirects HTTP→HTTPS so we probe the HTTPS port (8443) with -k to
      # skip the self-signed cert check. Kratos is probed directly on its own
      # port (4433). Each service is given 300 s.
      - name: Wait for pods to be healthy
        run: |
          timeout 300 bash -c '
            i=0
            until curl -sfk https://localhost:8443/ > /dev/null 2>&1; do
              i=$((i+1)); echo "[$(date +%T)] nginx not ready yet (attempt $i)"; sleep 3
            done
            echo "[$(date +%T)] nginx ready after attempt $i"' &
          P1=$!
          timeout 300 bash -c '
            i=0
            until curl -sf http://localhost:5221/weatherforecast > /dev/null 2>&1; do
              i=$((i+1)); echo "[$(date +%T)] weather-api not ready yet (attempt $i)"; sleep 3
            done
            echo "[$(date +%T)] weather-api ready after attempt $i"' &
          P2=$!
          timeout 300 bash -c '
            i=0
            until curl -sf http://localhost:4433/health/ready > /dev/null 2>&1; do
              i=$((i+1)); echo "[$(date +%T)] ory-kratos not ready yet (attempt $i)"; sleep 3
            done
            echo "[$(date +%T)] ory-kratos ready after attempt $i"' &
          P3=$!
          RC=0
          wait $P1; RC1=$?; [ $RC1 -ne 0 ] && echo "ERROR: nginx timed out (exit $RC1)" && RC=1 || echo "nginx ready"
          wait $P2; RC2=$?; [ $RC2 -ne 0 ] && echo "ERROR: weather-api timed out (exit $RC2)" && RC=1 || echo "weather-api ready"
          wait $P3; RC3=$?; [ $RC3 -ne 0 ] && echo "ERROR: ory-kratos timed out (exit $RC3)" && RC=1 || echo "ory-kratos ready"
          [ $RC -eq 0 ] && echo "All pods ready" || exit 1

      # Dump container logs for any service that failed to become healthy.
      # Runs only when the health-check step fails so normal runs stay clean.
      - name: Dump pod logs on health-check failure
        if: failure()
        run: |
          echo "=== podman ps -a ==="
          podman ps -a || true

          echo ""
          echo "=== container state & exit codes ==="
          for c in claude-hello-world-nginx weather-api-weather-api \
                   ory-kratos-ory-kratos ory-kratos-ory-kratos-init \
                   postgres-postgres; do
            echo "--- $c ---"
            podman inspect --format \
              'status={{.State.Status}} exit={{.State.ExitCode}} error="{{.State.Error}}"' \
              "$c" 2>/dev/null || echo "(not found)"
          done

          echo ""
          echo "=== listening ports (ss -tlnp) ==="
          ss -tlnp || true

          echo ""
          echo "=== curl probes (verbose) ==="
          echo "-- nginx (HTTPS 8443) --"
          curl -vk https://localhost:8443/ 2>&1 || true
          echo "-- weather-api (HTTP 5221) --"
          curl -v http://localhost:5221/weatherforecast 2>&1 || true
          echo "-- kratos public health (HTTP 4433) --"
          curl -v http://localhost:4433/health/ready 2>&1 || true
          echo "-- kratos admin health (HTTP 4434) --"
          curl -v http://localhost:4434/health/ready 2>&1 || true

          echo ""
          echo "=== nginx logs ==="
          podman logs claude-hello-world-nginx 2>&1 || true
          echo "=== weather-api logs ==="
          podman logs weather-api-weather-api 2>&1 || true
          echo "=== postgres logs ==="
          podman logs postgres-postgres 2>&1 || true
          echo "=== kratos-migrate logs ==="
          podman logs ory-kratos-kratos-migrate 2>&1 || true
          echo "=== ory-kratos logs ==="
          podman logs ory-kratos-ory-kratos 2>&1 || true
          echo "=== ory-kratos-init logs ==="
          podman logs ory-kratos-ory-kratos-init 2>&1 || true

      # ── Run all Playwright e2e suites ────────────────────────────────────────
      # Each suite sets BASE_URL so Playwright targets the running pod directly
      # (no local dev server is started). continue-on-error lets subsequent
      # suites run even if an earlier one fails; the workflow is failed at the
      # end via the "Fail if any suite failed" step.

      - name: E2E – shell (host)
        id: shell-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run shell-e2e:e2e
        continue-on-error: true

      - name: E2E – weather-app
        id: weather-app-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run weather-app-e2e:e2e
        continue-on-error: true

      - name: E2E – weatheredit-app
        id: weatheredit-app-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run weatheredit-app-e2e:e2e
        continue-on-error: true

      # ── Teardown (always runs) ───────────────────────────────────────────────
      - name: Stop EKS pods
        if: always()
        run: npx nx kube-down shell

      # ── Reporting ────────────────────────────────────────────────────────────
      # Publish JUnit XML as a GitHub Check Run (visible in PR Checks tab).
      # Each playwright.config.ts writes junit.xml when CI=true.
      - name: Publish test results as Check Run
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright EKS E2E (Full)
          path: apps/*/playwright-report/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      # Upload HTML reports so engineers can drill into failures.
      - name: Upload Playwright HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: apps/*/playwright-report/
          retention-days: 30

      # Fail the workflow if any e2e suite failed (after teardown + reporting).
      # always() is required here: without it, GitHub Actions implicitly adds
      # success() to custom if: conditions, so this step would be skipped when
      # a prior suite failed — causing a green badge despite test failures.
      - name: Fail workflow if any suite failed
        if: |
          always() && (
            steps.shell-e2e.outcome == 'failure' ||
            steps.weather-app-e2e.outcome == 'failure' ||
            steps.weatheredit-app-e2e.outcome == 'failure'
          )
        run: |
          echo "One or more e2e suites failed. See the Check Run and uploaded reports."
          exit 1
