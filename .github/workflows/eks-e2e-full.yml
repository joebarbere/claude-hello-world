name: EKS E2E Tests (Full)

on:
  workflow_dispatch:

# Permissions needed:
#   pull-requests: write  → post comment on the merged PR
#   checks: write         → dorny/test-reporter creates a Check Run
#   contents: read        → checkout
permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NX_NO_CLOUD: true

jobs:
  e2e:
    name: Playwright E2E – EKS Pods (Full)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & toolchain ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Node dependencies
        run: npm ci

      # Cache NuGet packages across runs; keyed on WeatherApi.csproj so the cache
      # is invalidated only when package references change (~1 min saved per run).
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('apps/weather-api/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      # Cache Playwright browser binaries (~100 MB) so they aren't re-downloaded
      # on every run. System-level deps are still installed when cache is hit.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Build container images ───────────────────────────────────────────────
      # shell:podman-build depends on build-all, which builds all 3 Angular MFEs
      # then packages them into the nginx container image.
      - name: Build Angular MFEs + nginx container image
        run: npx nx podman-build shell

      # weather-api:podman-build depends on weather-api:build (dotnet build)
      # then packages the published output into the ASP.NET container image.
      - name: Build weather-api container image
        run: NX_DAEMON=false npx nx podman-build weather-api

      # postgres:podman-build wraps postgres:17-alpine with env defaults.
      - name: Build postgres container image
        run: npx nx podman-build postgres

      # ── Start EKS pods ───────────────────────────────────────────────────────
      # kube-up runs: podman play kube k8s/pod.yaml
      # Pods defined: claude-hello-world (nginx :8080), weather-api (:5221),
      # postgres (:5432)
      - name: Start EKS pods (podman play kube)
        run: npx nx kube-up shell

      # Poll both pods concurrently to cut wait time when both are slow to start.
      # nginx redirects HTTP→HTTPS so we probe the HTTPS port (8443) with -k to
      # skip the self-signed cert check. Capture each PID so we can propagate
      # failures: if either timeout expires the step (and the workflow) fails.
      - name: Wait for pods to be healthy
        run: |
          timeout 90 bash -c \
            'until curl -sfk https://localhost:8443/ > /dev/null 2>&1; do sleep 3; done' &
          P1=$!
          timeout 90 bash -c \
            'until curl -sf http://localhost:5221/weatherforecast > /dev/null 2>&1; do sleep 3; done' &
          P2=$!
          wait $P1 && wait $P2
          echo "All pods ready"

      # ── Run all Playwright e2e suites ────────────────────────────────────────
      # Each suite sets BASE_URL so Playwright targets the running pod directly
      # (no local dev server is started). continue-on-error lets subsequent
      # suites run even if an earlier one fails; the workflow is failed at the
      # end via the "Fail if any suite failed" step.

      - name: E2E – shell (host)
        id: shell-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run shell-e2e:e2e
        continue-on-error: true

      - name: E2E – weather-app
        id: weather-app-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run weather-app-e2e:e2e
        continue-on-error: true

      - name: E2E – weatheredit-app
        id: weatheredit-app-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run weatheredit-app-e2e:e2e
        continue-on-error: true

      # ── Teardown (always runs) ───────────────────────────────────────────────
      - name: Stop EKS pods
        if: always()
        run: npx nx kube-down shell

      # ── Reporting ────────────────────────────────────────────────────────────
      # Publish JUnit XML as a GitHub Check Run (visible in PR Checks tab).
      # Each playwright.config.ts writes junit.xml when CI=true.
      - name: Publish test results as Check Run
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright EKS E2E (Full)
          path: apps/*/playwright-report/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      # Upload HTML reports so engineers can drill into failures.
      - name: Upload Playwright HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: apps/*/playwright-report/
          retention-days: 30

      # Fail the workflow if any e2e suite failed (after teardown + reporting).
      # always() is required here: without it, GitHub Actions implicitly adds
      # success() to custom if: conditions, so this step would be skipped when
      # a prior suite failed — causing a green badge despite test failures.
      - name: Fail workflow if any suite failed
        if: |
          always() && (
            steps.shell-e2e.outcome == 'failure' ||
            steps.weather-app-e2e.outcome == 'failure' ||
            steps.weatheredit-app-e2e.outcome == 'failure'
          )
        run: |
          echo "One or more e2e suites failed. See the Check Run and uploaded reports."
          exit 1
