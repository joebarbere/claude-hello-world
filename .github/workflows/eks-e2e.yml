name: EKS E2E Tests (Smoke)

on:
  push:
    branches:
      - main

# Permissions needed:
#   pull-requests: write  → post comment on the merged PR
#   checks: write         → dorny/test-reporter creates a Check Run
#   contents: read        → checkout
permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NX_NO_CLOUD: true

jobs:
  e2e:
    name: Playwright E2E – EKS Pods (Smoke)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & toolchain ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # Cache Playwright browser binaries (~100 MB) so they aren't re-downloaded
      # on every run. System-level deps are still installed when cache is hit.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Build container images with Docker ───────────────────────────────────
      # Using `docker build` instead of `npx nx podman-build` because rootless
      # podman's `podman play kube` does not reliably forward hostPort bindings
      # on GitHub Actions ubuntu-latest runners (all health checks time out).
      # Docker uses iptables-based port forwarding which works correctly here.
      # The .dockerignore at the repo root excludes node_modules and dist so
      # each Containerfile installs its own dependencies inside the build.

      # Containerfile.nginx runs `npm ci` + `npx nx run-many --target=build`
      # inside the Docker build, producing a self-contained nginx image.
      - name: Build Angular MFEs + nginx container image
        run: docker build -t claude-hello-world:latest -f Containerfile.nginx .

      # weather-api/Containerfile runs `dotnet restore` + `dotnet publish`
      # inside the Docker build (multi-stage).
      - name: Build weather-api container image
        run: docker build -t weather-api:latest -f apps/weather-api/Containerfile .

      # ory-kratos: copies kratos.yml + identity schema into the distroless image.
      # ory-kratos-init: copies init-users.sh into alpine.
      - name: Build ory-kratos container images
        run: |
          docker build -t ory-kratos:latest       -f apps/ory/Containerfile      apps/ory/
          docker build -t ory-kratos-init:latest  -f apps/ory/Containerfile.init apps/ory/

      # ── Start services via Docker Compose ────────────────────────────────────
      # docker-compose.ci.yml defines nginx, weather-api (Repository=Random,
      # no DB needed), ory-kratos (DSN=memory), and ory-kratos-init.
      # Port mappings mirror k8s/pod.yaml: nginx :8443, weather-api :5221,
      # kratos :4433/:4434.
      - name: Start services (docker compose)
        run: docker compose -f docker-compose.ci.yml up -d

      # Show initial container state immediately after compose up so we can see
      # image names and status in the log even if the health-check step times out.
      - name: Show container status after startup
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.ci.yml ps -a
          echo "=== docker ps -a ==="
          docker ps -a

      # Poll all services concurrently; each gets 120 s.
      # nginx: HTTPS on :8443 (self-signed cert → -k); serves Angular shell from
      #   the filesystem so it responds even if weather-api/kratos aren't ready.
      # weather-api: HTTP on :5221; Repository=Random returns JSON immediately.
      # ory-kratos: HTTP on :4433; DSN=memory means no migrations, fast startup.
      # RC is accumulated so every timeout is reported before the step fails.
      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c \
            'until curl -sfk https://localhost:8443/ > /dev/null 2>&1; do sleep 3; done' &
          P1=$!
          timeout 120 bash -c \
            'until curl -sf http://localhost:5221/weatherforecast > /dev/null 2>&1; do sleep 3; done' &
          P2=$!
          timeout 120 bash -c \
            'until curl -sf http://localhost:4433/health/ready > /dev/null 2>&1; do sleep 3; done' &
          P3=$!
          RC=0
          wait $P1; RC1=$?; [ $RC1 -ne 0 ] && echo "ERROR: nginx timed out (exit $RC1)" && RC=1 || echo "nginx ready"
          wait $P2; RC2=$?; [ $RC2 -ne 0 ] && echo "ERROR: weather-api timed out (exit $RC2)" && RC=1 || echo "weather-api ready"
          wait $P3; RC3=$?; [ $RC3 -ne 0 ] && echo "ERROR: ory-kratos timed out (exit $RC3)" && RC=1 || echo "ory-kratos ready"
          [ $RC -eq 0 ] && echo "All services ready" || exit 1

      # Dump container logs for any service that failed to become healthy.
      # Runs only when the health-check step fails so normal runs stay clean.
      - name: Dump container logs on health-check failure
        if: failure()
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.ci.yml ps -a || true
          echo "=== nginx logs ==="
          docker logs claude-hello-world-ci-nginx-1 2>&1 || \
            docker logs $(docker ps -aqf name=nginx) 2>&1 || true
          echo "=== weather-api logs ==="
          docker logs claude-hello-world-ci-weather-api-1 2>&1 || \
            docker logs $(docker ps -aqf name=weather-api) 2>&1 || true
          echo "=== ory-kratos logs ==="
          docker logs claude-hello-world-ci-ory-kratos-1 2>&1 || \
            docker logs $(docker ps -aqf name=ory-kratos) 2>&1 || true
          echo "=== ory-kratos-init logs ==="
          docker logs claude-hello-world-ci-ory-kratos-init-1 2>&1 || \
            docker logs $(docker ps -aqf name=ory-kratos-init) 2>&1 || true

      # ── Run Playwright e2e smoke suite ───────────────────────────────────────
      # Only run shell-e2e: it verifies the shell host, MFE navigation to
      # weather-app and weatheredit-app, and the /weather API proxy — enough
      # to confirm all three services are healthy after a deploy.
      # For the full CRUD test suite run the "EKS E2E Tests (Full)" workflow.

      # No continue-on-error: the workflow should fail (red badge) when tests
      # fail. All teardown and reporting steps below use "if: always()" so they
      # run regardless of whether this step exits 0 or not.
      - name: E2E – shell (host) smoke tests
        id: shell-e2e
        env:
          BASE_URL: https://localhost:8443
        run: npx nx run shell-e2e:e2e

      # ── Teardown (always runs) ───────────────────────────────────────────────
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.ci.yml down

      # ── Reporting ────────────────────────────────────────────────────────────
      # Publish JUnit XML as a GitHub Check Run (visible in PR Checks tab).
      # Each playwright.config.ts writes junit.xml when CI=true.
      - name: Publish test results as Check Run
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright EKS E2E (Smoke)
          path: apps/shell-e2e/playwright-report/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      # Upload HTML reports so engineers can drill into failures.
      - name: Upload Playwright HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: apps/shell-e2e/playwright-report/
          retention-days: 30

      # Post a summary comment on the PR that was just merged into main.
      - name: Comment results on merged PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Find the PR merged into main for this commit.
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = prs.find(p => p.state === 'closed' && p.merged_at);
            if (!pr) {
              console.log('No merged PR found for commit ' + context.sha + '; skipping comment.');
              return;
            }

            const icon = (o) =>
              o === 'success' ? '✅ Passed' :
              o === 'failure' ? '❌ Failed'  : '⚠️ Skipped';

            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '## 🎭 EKS E2E Smoke Test Results',
              '',
              '| App | Status |',
              '|-----|--------|',
              `| Shell (host)    | ${icon('${{ steps.shell-e2e.outcome }}')} |`,
              '',
              `_For full CRUD coverage, run the [EKS E2E Tests (Full)](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/eks-e2e-full.yml) workflow manually._`,
              '',
              `[View Playwright HTML reports & artifacts ↗](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
