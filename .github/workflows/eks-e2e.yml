name: EKS E2E Tests

on:
  push:
    branches:
      - main

# Permissions needed:
#   pull-requests: write  → post comment on the merged PR
#   checks: write         → dorny/test-reporter creates a Check Run
#   contents: read        → checkout
permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NX_NO_CLOUD: true

jobs:
  e2e:
    name: Playwright E2E – EKS Pods
    runs-on: ubuntu-latest

    steps:
      # ── Checkout & toolchain ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Node dependencies
        run: npm ci

      # Install only Chromium to keep CI fast; Firefox/WebKit can be added later.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Build container images ───────────────────────────────────────────────
      # shell:podman-build depends on build-all, which builds all 3 Angular MFEs
      # then packages them into the nginx container image.
      - name: Build Angular MFEs + nginx container image
        run: npx nx podman-build shell

      # weather-api:podman-build depends on weather-api:build (dotnet build)
      # then packages the published output into the ASP.NET container image.
      - name: Build weather-api container image
        run: NX_DAEMON=false npx nx podman-build weather-api

      # postgres:podman-build wraps postgres:17-alpine with env defaults.
      - name: Build postgres container image
        run: npx nx podman-build postgres

      # ── Start EKS pods ───────────────────────────────────────────────────────
      # kube-up runs: podman play kube k8s/pod.yaml
      # Pods defined: claude-hello-world (nginx :8080), weather-api (:5221),
      # postgres (:5432)
      - name: Start EKS pods (podman play kube)
        run: npx nx kube-up shell

      - name: Wait for nginx pod to be healthy
        run: |
          echo "Waiting for nginx on :8080..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 3; done'
          echo "nginx is ready"

      - name: Wait for weather-api pod to be healthy
        run: |
          echo "Waiting for weather-api on :5221..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:5221/weatherforecast > /dev/null 2>&1; do sleep 3; done'
          echo "weather-api is ready"

      # ── Run Playwright e2e suites ────────────────────────────────────────────
      # Each suite sets BASE_URL so Playwright targets the running pod directly
      # (no local dev server is started). continue-on-error lets subsequent
      # suites run even if an earlier one fails; the workflow is failed at the
      # end via the "Fail if any suite failed" step.

      - name: E2E – shell (host)
        id: shell-e2e
        env:
          BASE_URL: http://localhost:8080
        run: npx nx run shell-e2e:e2e
        continue-on-error: true

      - name: E2E – weather-app
        id: weather-app-e2e
        env:
          BASE_URL: http://localhost:8080/weather-app/
        run: npx nx run weather-app-e2e:e2e
        continue-on-error: true

      - name: E2E – weatheredit-app
        id: weatheredit-app-e2e
        env:
          BASE_URL: http://localhost:8080/weatheredit-app/
        run: npx nx run weatheredit-app-e2e:e2e
        continue-on-error: true

      # ── Teardown (always runs) ───────────────────────────────────────────────
      - name: Stop EKS pods
        if: always()
        run: npx nx kube-down shell

      # ── Reporting ────────────────────────────────────────────────────────────
      # Publish JUnit XML as a GitHub Check Run (visible in PR Checks tab).
      # Each playwright.config.ts writes junit.xml when CI=true.
      - name: Publish test results as Check Run
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright EKS E2E
          path: apps/*/playwright-report/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      # Upload HTML reports so engineers can drill into failures.
      - name: Upload Playwright HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: apps/*/playwright-report/
          retention-days: 30

      # Post a summary comment on the PR that was just merged into main.
      - name: Comment results on merged PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Find the PR merged into main for this commit.
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = prs.find(p => p.state === 'closed' && p.merged_at);
            if (!pr) {
              console.log('No merged PR found for commit ' + context.sha + '; skipping comment.');
              return;
            }

            const icon = (o) =>
              o === 'success' ? '✅ Passed' :
              o === 'failure' ? '❌ Failed'  : '⚠️ Skipped';

            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '## 🎭 EKS E2E Test Results',
              '',
              '| App | Status |',
              '|-----|--------|',
              `| Shell (host)    | ${icon('${{ steps.shell-e2e.outcome }}')} |`,
              `| weather-app     | ${icon('${{ steps.weather-app-e2e.outcome }}')} |`,
              `| weatheredit-app | ${icon('${{ steps.weatheredit-app-e2e.outcome }}')} |`,
              '',
              `[View Playwright HTML reports & artifacts ↗](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });

      # Fail the workflow if any e2e suite failed (after teardown + reporting).
      - name: Fail workflow if any suite failed
        if: |
          steps.shell-e2e.outcome == 'failure' ||
          steps.weather-app-e2e.outcome == 'failure' ||
          steps.weatheredit-app-e2e.outcome == 'failure'
        run: |
          echo "One or more e2e suites failed. See the Check Run and uploaded reports."
          exit 1
